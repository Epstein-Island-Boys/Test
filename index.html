<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta charset="utf-8"/>
        <meta http-equiv="pragma" content="no-cache"/>
        <title>Escape Stein</title>
        <style>
            html, body {
                width: 100%;
                height: 100%;
                margin: 0px;
                padding: 0px;
                border: 0px;
                background: black;
                overflow: hidden;
            }
            #gm4html5_div_id {
                position: absolute;
                left: 0;
                top: 0;
            }
            canvas {
                width: 1366px;
                height: 768px;
                display: block;
                image-rendering: optimizeSpeed;
                -webkit-interpolation-mode: nearest-neighbor;
                -ms-touch-action: none;
                touch-action: none;
                margin: 0px;
                padding: 0px;
                border: 0px;
            }
            :-webkit-full-screen #canvas {
                width: 100%;
                height: 100%;
            }
            :-webkit-full-screen {
                width: 100%;
                height: 100%;
            }
            div.gm4html5_div_class {
                margin: 0px;
                padding: 0px;
                border: 0px;
            }
            div.gm4html5_login {
                padding: 20px;
                position: absolute;
                border: solid 2px #000000;
                background-color: #404040;
                color:#00ff00;
                border-radius: 15px;
                box-shadow: #101010 20px 20px 40px;
            }
            div.gm4html5_cancel_button { float: right; }
            div.gm4html5_login_button { float: left; }
            div.gm4html5_login_header { text-align: center; }
        </style>
    </head>

    <body>
        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="1366" height="768">
                <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="escapeStein/Blank Pixel Game.js?cachebust=130141080"></script>

        <script>
            const BASE_W = 1366;
            const BASE_H = 768;

            function scaleGame() {
                const canvas = document.getElementById("canvas");
                const gmDiv  = document.getElementById("gm4html5_div_id");
                const scale = Math.min(
                    window.innerWidth  / BASE_W,
                    window.innerHeight / BASE_H
                );
                const w = Math.floor(BASE_W * scale);
                const h = Math.floor(BASE_H * scale);
                canvas.style.width  = w + "px";
                canvas.style.height = h + "px";
                gmDiv.style.width   = w + "px";
                gmDiv.style.height  = h + "px";
            }

            window.addEventListener("resize", scaleGame);
            window.onload = function () {
                GameMaker_Init();
                scaleGame();
            };
        </script>
    </body>
</html>
